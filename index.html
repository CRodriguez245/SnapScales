<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>SnapScales</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.4/p5.min.js"></script>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  /* Session-wide accent — updated by JS on every init/reset */
  :root {
    --accent:     #34d399;
    --accent-rgb: 52, 211, 153;
  }

  body {
    background: #ffffff;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    gap: 13px;
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    color: #1e293b;
    user-select: none;
    -webkit-touch-callout: none;
    -webkit-tap-highlight-color: transparent;
    padding-top: 20px;
    padding-bottom: 40px;
  }

  @media (max-width: 768px) {
    html {
      height: auto;
      min-height: 100%;
      overflow-x: hidden;
    }
    
    body {
      justify-content: flex-start;
      padding-top: 15px;
      padding-bottom: 30px;
      min-height: 100vh;
      height: auto;
      overflow-x: hidden;
      -webkit-overflow-scrolling: touch;
      touch-action: pan-y pinch-zoom;  /* Allow vertical scrolling and pinch zoom */
    }
  }

  h1 {
    font-family: Georgia, 'Times New Roman', serif;
    font-size: 2.4rem;
    font-weight: normal;
    letter-spacing: 4px;
    color: #000000;
    transition: color .6s;
  }

  .hint {
    font-size: 0.72rem;
    letter-spacing: 1px;
    color: #94a3b8;
  }

  #bar {
    display: flex;
    align-items: center;
    gap: 26px;
  }

  .stat {
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: #94a3b8;
  }
  .stat .val {
    color: var(--accent);
    font-weight: 700;
    font-size: 1.05rem;
    margin-left: 5px;
    transition: color .6s;
  }

  #reset-btn {
    background: transparent;
    border: 1px solid #e2e8f0;
    color: #94a3b8;
    padding: 4px 14px;
    border-radius: 4px;
    font-size: 0.72rem;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    cursor: pointer;
    transition: border-color .2s, box-shadow .2s, color .6s;
  }
  #reset-btn:hover {
    border-color: #94a3b8;
    box-shadow: 0 0 14px rgba(148, 163, 184, .22);
  }

  #export-btn, #export-dxf-btn {
    background: transparent;
    border: 1px solid #e2e8f0;
    color: #94a3b8;
    padding: 4px 14px;
    border-radius: 4px;
    font-size: 0.72rem;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    cursor: pointer;
    transition: border-color .2s, box-shadow .2s, color .6s;
  }
  #export-btn:hover, #export-dxf-btn:hover {
    border-color: #94a3b8;
    box-shadow: 0 0 14px rgba(148, 163, 184, .22);
  }

  #canvas-wrap {
    line-height: 0;
    width: 100%;
    max-width: 100%;
    overflow: hidden;
  }

  #msg {
    height: 1.6em;
    font-size: 0.88rem;
    letter-spacing: 5px;
    color: #d97706;
    text-transform: uppercase;
    text-shadow: 0 0 16px rgba(217,119,6,.3);
  }

  /* Mobile responsive styles */
  @media (max-width: 768px) {
    body {
      padding: 10px;
      gap: 10px;
    }

    h1 {
      font-size: 1.8rem;
      letter-spacing: 2px;
    }

    .hint {
      font-size: 0.65rem;
      padding: 0 10px;
      text-align: center;
    }

    #bar {
      gap: 15px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .stat {
      font-size: 0.7rem;
    }
    .stat .val {
      font-size: 0.95rem;
    }

    #reset-btn {
      font-size: 0.65rem;
      padding: 6px 12px;
    }

    #msg {
      font-size: 0.75rem;
      letter-spacing: 3px;
      padding: 0 10px;
      text-align: center;
    }

    #canvas-wrap {
      width: 100%;
      max-width: 100vw;
      overflow: hidden;
    }

    #canvas-wrap canvas {
      max-width: 100%;
      height: auto !important;
    }
  }

  @media (max-width: 480px) {
    h1 {
      font-size: 1.5rem;
    }

    .hint {
      font-size: 0.6rem;
    }

    #bar {
      gap: 12px;
    }

    .stat {
      font-size: 0.65rem;
    }
    .stat .val {
      font-size: 0.9rem;
    }
  }
</style>
</head>
<body>

<h1>SnapScales</h1>
<p class="hint">Fill every socket inside the boundary. 10s countdown, +1s per scale. Cross the line = game over. Export SVG/DXF for laser cutting.</p>

<div id="bar">
  <div class="stat">Scales  <span class="val" id="n-scales" style="color: #000000;">0</span></div>
  <div class="stat">Time  <span class="val" id="timer">10</span></div>
  <button id="reset-btn" onclick="resetGame()">↺&nbsp; Reset</button>
  <button id="export-btn" onclick="exportForLaser('svg')" title="Export SVG for laser cutting">↓&nbsp; SVG</button>
  <button id="export-dxf-btn" onclick="exportForLaser('dxf')" title="Export DXF for laser cutting">↓&nbsp; DXF</button>
</div>

<div id="canvas-wrap"></div>
<div id="msg"></div>

<script>
/* ============================================================
   SnapScales — hex-lattice gap-filling game
   ============================================================ */

// ── config ──────────────────────────────────────────────────
let C        = 580;    // canvas width px (set dynamically to window width)
const CH     = 580;    // canvas height px (base height for game logic)
let actualCanvasHeight = CH;  // actual canvas height (may be taller on mobile)
const HS     = 27;     // hex cell radius px
const MIN_N  = 1;      // min placed neighbours to unlock a socket (1 = expand from any tile)
const DUR    = 450;    // snap-anim duration ms

// axial hex directions (pointy-top)
const DIRS = [[1,0],[1,-1],[0,-1],[-1,0],[-1,1],[0,1]];

// Neighbour offsets — try (0,-1) first (good for triangles), then others
const SEED_NEIGHBOURS = [[0,-1],[1,-1],[-1,-1],[1,0],[0,1],[-1,0]];

// Returns seeds for a shape: center + first neighbour that fits (ensures 2 adjacent for sockets)
function getSeedsForShape(shape) {
  const seeds = [[0, 0]];
  for (const [dq, dr] of SEED_NEIGHBOURS) {
    const q = shape.centerQ + dq;
    const r = shape.centerR + dr;
    if (inShape(q, r, shape)) {
      seeds.push([dq, dr]);
      return seeds;
    }
  }
  return seeds;
}

// ── session palette + shape (randomised each init/reset) ─────
let sessionHue   = 155;           // 0-360, drives all colours this session
let accentRgb    = [52, 211, 153]; // [r,g,b] 0-255 — bright accent from sessionHue
let gameCanvas   = null;           // p5 canvas element, set in p.setup
let sessionShapes = [];            // Array<{ type, centerQ, centerR, size, baseHue }>
let scalesPlaced = 0;              // counter for progressive boundary spawning

// ── state ────────────────────────────────────────────────────
let occupied  = new Set();  // Set<"q,r">
let scales    = [];          // Array<ScaleObj>
let sockets   = [];          // Array<SocketObj>  — each has { …, danger: bool }
let particles = [];
let gameOver  = false;
let gameLost  = false;       // true when player placed a scale past the boundary
let timerExpired = false;    // true when countdown reaches 0
let timeRemaining = 10;      // seconds left (starts at 10, +1 per scale placed)
let lastTimerMs = 0;        // last frame time for delta

// ── pure utilities ───────────────────────────────────────────
const kk = (q, r) => `${q},${r}`;

function gridToPixel(q, r) {
  return {
    x: C / 2 + HS * (Math.sqrt(3) * q + Math.sqrt(3) / 2 * r),
    y: CH / 2 + HS * (1.5 * r)
  };
}

function pixelToGrid(px, py) {
  const r = (py - CH / 2) / (HS * 1.5);
  const q = (px - C / 2 - HS * (Math.sqrt(3) / 2) * r) / (HS * Math.sqrt(3));
  return { q, r };
}

function neighbours(q, r) {
  return DIRS.map(([dq, dr]) => [q + dq, r + dr]);
}

// deterministic per-tile XOR-shift PRNG
function tileRng(q, r) {
  let s = (((q * 73856093) ^ (r * 19349663)) >>> 0) | 1;
  return () => {
    s ^= s << 13;
    s ^= s >> 17;
    s ^= s << 5;
    return (s >>> 0) / 0x100000000;
  };
}

// jittered hexagon polygon — stable per (q,r)
function makePolygon(x, y, q, r) {
  const rng = tileRng(q, r);
  return Array.from({ length: 6 }, (_, i) => {
    const base = Math.PI / 6 + i * Math.PI / 3;   // pointy-top base angle
    const rj   = 0.82 + rng() * 0.30;              // radial jitter  0.82–1.12
    const aj   = (rng() - 0.5) * 0.22;             // angular jitter ±0.11 rad
    return {
      x: x + HS * rj * Math.cos(base + aj),
      y: y + HS * rj * Math.sin(base + aj)
    };
  });
}

// HSB (0-360, 0-100, 0-100) → [r,g,b] 0-255
function hsbToRgb(h, s, b) {
  h /= 360; s /= 100; b /= 100;
  const i  = Math.floor(h * 6);
  const f  = h * 6 - i;
  const p  = b * (1 - s);
  const q2 = b * (1 - f * s);
  const t  = b * (1 - (1 - f) * s);
  const lut = [[b,t,p],[q2,b,p],[p,b,t],[p,q2,b],[t,p,b],[b,p,q2]];
  const [rv, gv, bv] = lut[i % 6];
  return [rv * 255 | 0, gv * 255 | 0, bv * 255 | 0];
}

// Finds which shape (if any) contains the given (q,r) coordinate.
// Returns the shape object or null.
function findShapeForTile(q, r) {
  for (const shape of sessionShapes) {
    if (inShape(q, r, shape)) return shape;
  }
  return null;
}

// deterministic tile colour — uses baseHue of the shape it's in, or sessionHue if outside
function tileColor(q, r, baseHueOverride = null) {
  const rng = tileRng(q * 37 + 5, r * 53 + 11);
  // Determine base hue: use override if provided, else find shape's baseHue, else sessionHue
  let baseHue = baseHueOverride;
  if (baseHue === null) {
    const shape = findShapeForTile(q, r);
    baseHue = shape ? shape.baseHue : sessionHue;
  }
  // ±22 hue spread around base; each tile also has ±6 brightness shift
  const hue = ((baseHue - 22 + rng() * 44) + 360) % 360;
  return hsbToRgb(hue, 52 + rng() * 32, 46 + rng() * 24);
}

// orientation theta: global horizontal strain + subtle r-gradient
function tileTheta(q, r) {
  const rng = tileRng(q + 200, r + 200);
  return 0.065 * r + (rng() - 0.5) * 0.14;
}

// ── playfield shape ───────────────────────────────────────────
// Geometric shapes defined as polygons in pixel space.
// Shape: { type, centerQ, centerR, size, baseHue }

const GEOM_TYPES = ['circle', 'square', 'triangle', 'pentagon', 'hexagon'];

// Generates a geometric shape. size = radius in pixels (from center to vertex).
function generateShape(centerQ = 0, centerR = 0) {
  const type = GEOM_TYPES[Math.floor(Math.random() * GEOM_TYPES.length)];
  // Size: HS * 2.2 to HS * 3.2 (triangles get +40% — they have less area per radius)
  let size = HS * (2.2 + Math.random() * 1.0);
  if (type === 'triangle') size *= 1.4;

  const hash = ((centerQ * 73856093) ^ (centerR * 19349663)) >>> 0;
  const hueOffset = (hash % 120);
  const baseHue = (sessionHue + hueOffset) % 360;

  return { type, centerQ, centerR, size, baseHue };
}

// Scale shape down until it fits within canvas.
function fitShape(shape) {
  const PAD = 20;
  const minSize = HS * 0.5;
  for (let attempt = 0; attempt < 30; attempt++) {
    const pts = shapeCornerPixels(shape);
    const ok = pts.every(pt =>
      pt.x >= PAD && pt.x <= C - PAD && pt.y >= PAD && pt.y <= actualCanvasHeight - PAD
    );
    if (ok) return;
    shape.size = Math.max(minSize, shape.size * 0.85);
  }
}

// Returns true if axial cell (q,r) is inside the given shape (point-in-polygon).
function inShape(q, r, shape) {
  const { x, y } = gridToPixel(q, r);
  const poly = shapeCornerPixels(shape);
  return pointInPolygon(x, y, poly);
}

// Returns true if (q,r) is inside ANY active boundary.
function inAnyShape(q, r) {
  return sessionShapes.some(shape => inShape(q, r, shape));
}

// Returns true when every cell inside every boundary is filled.
function allBoundariesFilled() {
  // Compute extent from actual shapes (shapes can be stacked far below on mobile)
  let qMin = Infinity, qMax = -Infinity, rMin = Infinity, rMax = -Infinity;
  for (const shape of sessionShapes) {
    const extent = Math.ceil(shape.size / HS) + 2;
    qMin = Math.min(qMin, shape.centerQ - extent);
    qMax = Math.max(qMax, shape.centerQ + extent);
    rMin = Math.min(rMin, shape.centerR - extent);
    rMax = Math.max(rMax, shape.centerR + extent);
  }
  for (let q = qMin; q <= qMax; q++) {
    for (let r = rMin; r <= rMax; r++) {
      if (inAnyShape(q, r) && !occupied.has(kk(q, r))) return false;
    }
  }
  return true;
}

// Derives polygon vertices for the shape in pixel space.
// Angles: 0° = right, 90° = down (canvas). Vertices use cx + r*cos(θ), cy + r*sin(θ).
function shapeCornerPixels(shape) {
  const { x: cx, y: cy } = gridToPixel(shape.centerQ, shape.centerR);
  const r = shape.size;
  const pts = [];

  if (shape.type === 'circle') {
    // Octagon approximation
    for (let i = 0; i < 8; i++) {
      const a = (i / 8) * Math.PI * 2 - Math.PI / 2;  // start from top
      pts.push({ x: cx + r * Math.cos(a), y: cy + r * Math.sin(a) });
    }
  } else if (shape.type === 'square') {
    const a45 = Math.PI / 4;
    for (let i = 0; i < 4; i++) {
      const a = a45 + (i / 4) * Math.PI * 2;
      pts.push({ x: cx + r * Math.cos(a), y: cy + r * Math.sin(a) });
    }
  } else if (shape.type === 'triangle') {
    for (let i = 0; i < 3; i++) {
      const a = Math.PI / 2 + (i / 3) * Math.PI * 2;  // point-up
      pts.push({ x: cx + r * Math.cos(a), y: cy + r * Math.sin(a) });
    }
  } else if (shape.type === 'pentagon') {
    for (let i = 0; i < 5; i++) {
      const a = Math.PI / 2 + (i / 5) * Math.PI * 2;
      pts.push({ x: cx + r * Math.cos(a), y: cy + r * Math.sin(a) });
    }
  } else {
    // hexagon
    for (let i = 0; i < 6; i++) {
      const a = Math.PI / 2 + (i / 6) * Math.PI * 2;  // pointy-top
      pts.push({ x: cx + r * Math.cos(a), y: cy + r * Math.sin(a) });
    }
  }
  return pts;
}

// Point-in-polygon test using ray casting algorithm
function pointInPolygon(px, py, polygon) {
  let inside = false;
  for (let i = 0, j = polygon.length - 1; i < polygon.length; j = i++) {
    const xi = polygon[i].x, yi = polygon[i].y;
    const xj = polygon[j].x, yj = polygon[j].y;
    const intersect = ((yi > py) !== (yj > py)) && (px < (xj - xi) * (py - yi) / (yj - yi) + xi);
    if (intersect) inside = !inside;
  }
  return inside;
}

// Checks if two polygons overlap by testing if any vertex of one is inside the other
function polygonsOverlap(poly1, poly2) {
  // Check if any vertex of poly1 is inside poly2
  for (const pt of poly1) {
    if (pointInPolygon(pt.x, pt.y, poly2)) return true;
  }
  // Check if any vertex of poly2 is inside poly1
  for (const pt of poly2) {
    if (pointInPolygon(pt.x, pt.y, poly1)) return true;
  }
  return false;
}

// Checks if a new shape overlaps with any existing shapes using polygon intersection.
function shapesOverlap(newShape, existingShapes) {
  const newPoly = shapeCornerPixels(newShape);
  
  for (const existing of existingShapes) {
    const existingPoly = shapeCornerPixels(existing);
    
    // Check polygon intersection
    if (polygonsOverlap(newPoly, existingPoly)) return true;
    
    // Also check if centers are inside each other (catches containment cases)
    if (inShape(newShape.centerQ, newShape.centerR, existing)) return true;
    if (inShape(existing.centerQ, existing.centerR, newShape)) return true;
  }
  return false;
}

// ── socket logic ─────────────────────────────────────────────
function recomputeSockets() {
  const cands = new Map();   // key → neighbour-count
  for (const k of occupied) {
    const [q, r] = k.split(',').map(Number);
    for (const [nq, nr] of neighbours(q, r)) {
      const nk = kk(nq, nr);
      if (!occupied.has(nk))
        cands.set(nk, (cands.get(nk) || 0) + 1);
    }
  }
  sockets = [];
  for (const [k, cnt] of cands) {
    if (cnt < MIN_N) continue;
    const [q, r] = k.split(',').map(Number);
    const { x, y } = gridToPixel(q, r);
    // No canvas bounds check — allow sockets anywhere (boundary check handles validity)
    // danger = socket is outside ALL session boundary polygons
    sockets.push({ q, r, x, y, cnt, danger: !inAnyShape(q, r) });
  }
}

// ── particle helpers ─────────────────────────────────────────
function spawnParticles(x, y) {
  // sparkle dots — hues orbit the session accent
  for (let i = 0; i < 14; i++) {
    const a  = Math.random() * Math.PI * 2;
    const sp = 1.4 + Math.random() * 3.2;
    particles.push({
      type: 'dot', x, y,
      vx: Math.cos(a) * sp, vy: Math.sin(a) * sp,
      life: 1,
      decay: 0.020 + Math.random() * 0.018,
      sz: 1.5 + Math.random() * 3,
      hue: ((sessionHue - 28 + Math.random() * 56) + 360) % 360,
      sat: 65 + Math.random() * 30,
      bri: 80 + Math.random() * 20
    });
  }
  // ripple rings (3 at increasing radii)
  for (let i = 0; i < 3; i++) {
    particles.push({
      type: 'ring', x, y,
      startR: HS * 0.12,
      endR:   HS * (0.9 + i * 0.55),
      progress: 0,
      speed: 0.065 - i * 0.012,
      life: 1,
      decay: 0.026 + i * 0.009
    });
  }
}

// Red burst + rings fired when the player places past the boundary
function spawnLoseParticles(x, y) {
  // fiery dots — red/orange range
  for (let i = 0; i < 22; i++) {
    const a  = Math.random() * Math.PI * 2;
    const sp = 1.8 + Math.random() * 4.5;
    particles.push({
      type: 'dot', x, y,
      vx: Math.cos(a) * sp, vy: Math.sin(a) * sp,
      life: 1,
      decay: 0.014 + Math.random() * 0.016,
      sz: 2 + Math.random() * 4.5,
      hue: 0 + Math.random() * 28,   // red → orange
      sat: 80 + Math.random() * 20,
      bri: 65 + Math.random() * 30
    });
  }
  // expanding red rings
  for (let i = 0; i < 4; i++) {
    particles.push({
      type: 'ring', x, y,
      startR: HS * 0.1,
      endR:   HS * (1.1 + i * 0.6),
      progress: 0,
      speed: 0.06 - i * 0.01,
      life: 1,
      decay: 0.020 + i * 0.007,
      rgb: [215, 55, 55]            // red colour override for this ring
    });
  }
}

// ── session theme ─────────────────────────────────────────────
// Rolls a fresh random hue, derives the accent colour and pushes it to CSS.
function applySessionTheme() {
  const [r, g, b] = accentRgb;
  const toHex = v => v.toString(16).padStart(2, '0');
  const hex   = `#${toHex(r)}${toHex(g)}${toHex(b)}`;
  const root  = document.documentElement.style;
  root.setProperty('--accent',     hex);
  root.setProperty('--accent-rgb', `${r}, ${g}, ${b}`);
  // no canvas box-shadow — canvas is transparent, game floats on page
}

// Expands canvas height on mobile if needed to fit all boundaries
function expandCanvasIfNeeded() {
  const isMobile = window.innerWidth <= 768;
  if (!isMobile || !gameCanvas) return;
  
  // Find the bottommost point of all boundaries
  let maxY = 0;
  for (const shape of sessionShapes) {
    const pts = shapeCornerPixels(shape);
    for (const pt of pts) {
      if (pt.y > maxY) maxY = pt.y;
    }
  }
  
  // Add padding and calculate needed height
  const neededHeight = maxY + 40;  // 40px padding at bottom
  const currentHeight = actualCanvasHeight;
  
  // Expand canvas if needed
  if (neededHeight > currentHeight) {
    actualCanvasHeight = neededHeight;
    p.resizeCanvas(C, actualCanvasHeight);
    if (gameCanvas) {
      gameCanvas.style('width', '100%');
      gameCanvas.style('max-width', '100%');
    }
  }
}

// Spawns a new boundary at a random position that doesn't overlap existing ones.
function spawnNewBoundary() {
  const isMobile = window.innerWidth <= 768;
  const maxRadiusEstimate = 3;  // geometric shapes are smaller
  const maxPixelExtentQ = maxRadiusEstimate * HS * Math.sqrt(3);  // ~374px
  const maxPixelExtentR = maxRadiusEstimate * HS * 1.5;           // ~324px
  const PAD = 20;
  
  let centerQ, centerR;
  
  if (isMobile) {
    // Mobile: Stack vertically - place new boundary below existing ones
    let maxR = 0;
    for (const shape of sessionShapes) {
      const pts = shapeCornerPixels(shape);
      for (const pt of pts) {
        const { r } = pixelToGrid(pt.x, pt.y);
        if (r > maxR) maxR = r;
      }
    }
    
    centerQ = 0;
    centerR = Math.ceil(maxR) + 3;  // tight spacing for dense layout
    
    // Note: We'll expand the canvas if needed after placing the boundary
    // So we don't need to constrain centerR here - just place it and expand canvas
  } else {
    // Desktop: Place horizontally - calculate bounds as before
    const qMin = Math.floor((PAD - C/2 + maxPixelExtentQ) / (HS * Math.sqrt(3)));
    const qMax = Math.floor((C - PAD - C/2 - maxPixelExtentQ) / (HS * Math.sqrt(3)));
    const rMin = Math.floor((PAD - CH/2 + maxPixelExtentR) / (HS * 1.5));
    const rMax = Math.floor((CH - PAD - CH/2 - maxPixelExtentR) / (HS * 1.5));
    
    // Try up to 150 random positions (dense layout needs more tries)
    let found = false;
    for (let attempt = 0; attempt < 150 && !found; attempt++) {
      // Random center position constrained to fit within canvas
      centerQ = qMin + Math.floor(Math.random() * (qMax - qMin + 1));
      centerR = rMin + Math.floor(Math.random() * (rMax - rMin + 1));
      
      const newShape = generateShape(centerQ, centerR);
      fitShape(newShape);
      
      // Check overlap
      if (!shapesOverlap(newShape, sessionShapes)) {
        sessionShapes.push(newShape);
        
        // Place initial seeds (center + first neighbour that fits — ensures sockets)
        for (const [dq, dr] of getSeedsForShape(newShape)) {
          const q = newShape.centerQ + dq;
          const r = newShape.centerR + dr;
          if (inShape(q, r, newShape) && !occupied.has(kk(q, r))) {
            occupied.add(kk(q, r));
            const { x, y } = gridToPixel(q, r);
            scales.push({
              q, r, x, y,
              poly:  makePolygon(x, y, q, r),
              col:   tileColor(q, r, newShape.baseHue),  // Use shape's baseHue
              theta: tileTheta(q, r),
              animT: 1,
              animStart: -1e9
            });
          }
        }
        
        found = true;
        return true;
      }
    }
    return false;  // couldn't find non-overlapping position
  }
  
  // For mobile, try the calculated position
  // First, estimate canvas height needed and expand if necessary
  if (isMobile) {
    // Estimate the bottom Y position of the new boundary
    const estimatedBottomR = centerR + maxRadiusEstimate;
    const { y: estimatedY } = gridToPixel(0, estimatedBottomR);
    const neededHeight = estimatedY + maxPixelExtentR + PAD;
    
    if (neededHeight > actualCanvasHeight && gameCanvas) {
      actualCanvasHeight = neededHeight;
      p.resizeCanvas(C, actualCanvasHeight);
      gameCanvas.style('width', '100%');
      gameCanvas.style('max-width', '100%');
    }
  }
  
  const newShape = generateShape(centerQ, centerR);
  fitShape(newShape);
  
  // Check overlap
  if (!shapesOverlap(newShape, sessionShapes)) {
    sessionShapes.push(newShape);
    
    // Place initial seeds (center + first neighbour that fits — ensures sockets)
    for (const [dq, dr] of getSeedsForShape(newShape)) {
      const q = newShape.centerQ + dq;
      const r = newShape.centerR + dr;
      if (inShape(q, r, newShape) && !occupied.has(kk(q, r))) {
        occupied.add(kk(q, r));
        const { x, y } = gridToPixel(q, r);
        scales.push({
          q, r, x, y,
          poly:  makePolygon(x, y, q, r),
          col:   tileColor(q, r, newShape.baseHue),  // Use shape's baseHue
          theta: tileTheta(q, r),
          animT: 1,
          animStart: -1e9
        });
      }
    }
    
    // On mobile, expand canvas again to ensure all corners fit
    expandCanvasIfNeeded();
    
    return true;
  }
  
  return false;  // couldn't find non-overlapping position
}

// ── game init ────────────────────────────────────────────────
function initGame() {
  // Pick a brand-new random palette + playfield shape for this session
  sessionHue = Math.random() * 360;
  accentRgb  = hsbToRgb(sessionHue, 76, 84);   // vivid, bright accent
  applySessionTheme();

  occupied     = new Set();
  scales       = [];
  sockets      = [];
  particles    = [];
  gameOver     = false;
  gameLost     = false;
  timerExpired = false;
  timeRemaining = 10;
  lastTimerMs = 0;
  scalesPlaced = 0;
  sessionShapes = [];

  // Start with one boundary; more spawn progressively as you place scales
  const initialShape = generateShape(0, 0);
  fitShape(initialShape);
  sessionShapes.push(initialShape);

  for (const [dq, dr] of getSeedsForShape(initialShape)) {
    const q = initialShape.centerQ + dq;
    const r = initialShape.centerR + dr;
    if (occupied.has(kk(q, r))) continue;
    occupied.add(kk(q, r));
    const { x, y } = gridToPixel(q, r);
    scales.push({
      q, r, x, y,
      poly:  makePolygon(x, y, q, r),
      col:   tileColor(q, r, initialShape.baseHue),  // Use initial shape's baseHue
      theta: tileTheta(q, r),
      animT: 1,       // pre-placed → no animation
      animStart: -1e9
    });
  }
  recomputeSockets();
}

// Export scales for laser cutting. format: 'svg' or 'dxf'
function exportForLaser(format) {
  if (scales.length === 0) {
    alert('Place at least one scale to export.');
    return;
  }
  const MM_PER_PX = 0.5;  // 1px = 0.5mm (adjust for material size)
  let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
  for (const sc of scales) {
    for (const v of sc.poly) {
      minX = Math.min(minX, v.x); minY = Math.min(minY, v.y);
      maxX = Math.max(maxX, v.x); maxY = Math.max(maxY, v.y);
    }
  }
  const pad = 5;
  const toMm = (x, y, flipY = false) => ({
    x: (x - minX + pad) * MM_PER_PX,
    y: flipY ? (maxY - y + pad) * MM_PER_PX : (y - minY + pad) * MM_PER_PX
  });

  if (format === 'svg') {
    const w = (maxX - minX + pad * 2) * MM_PER_PX;
    const h = (maxY - minY + pad * 2) * MM_PER_PX;
    const paths = scales.map(sc => {
      const pts = sc.poly.map(v => toMm(v.x, v.y, false));
      const d = pts.map((p, i) => (i === 0 ? 'M' : 'L') + p.x.toFixed(3) + ',' + p.y.toFixed(3)).join(' ') + ' Z';
      return `<path d="${d}" fill="none" stroke="#000" stroke-width="0.01"/>`;
    }).join('\n  ');
    const svg = `<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 ${w.toFixed(2)} ${h.toFixed(2)}" width="${w.toFixed(2)}mm" height="${h.toFixed(2)}mm">
  ${paths}
</svg>`;
    const blob = new Blob([svg], { type: 'image/svg+xml' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `snapscales-${Date.now()}.svg`;
    a.click();
    URL.revokeObjectURL(a.href);
  } else {
    // DXF R12 format - LWPOLYLINE entities (Y-up)
    const entities = scales.map(sc => {
      const pts = sc.poly.map(v => toMm(v.x, v.y, true));
      let dxf = '0\nLWPOLYLINE\n8\n0\n62\n7\n70\n1\n';  // closed polyline
      for (const p of pts) {
        dxf += `10\n${p.x.toFixed(6)}\n20\n${p.y.toFixed(6)}\n`;
      }
      return dxf;
    }).join('');
    const dxf = `0
SECTION
2
HEADER
9
$ACADVER
1
AC1009
0
ENDSEC
0
SECTION
2
ENTITIES
${entities}0
ENDSEC
0
EOF`;
    const blob = new Blob([dxf], { type: 'application/dxf' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `snapscales-${Date.now()}.dxf`;
    a.click();
    URL.revokeObjectURL(a.href);
  }
}

function updateUI() {
  document.getElementById('n-scales').textContent  = scales.length;
  document.getElementById('timer').textContent    = Math.ceil(timeRemaining);

  const msgEl = document.getElementById('msg');
  if (gameLost) {
    msgEl.textContent  = '✦   Boundary Breached   ✦';
    msgEl.style.color  = '#ef4444';
    msgEl.style.textShadow = '0 0 18px rgba(239,68,68,.35)';
  } else if (timerExpired) {
    msgEl.textContent  = '✦   Time\'s Up!   ✦';
    msgEl.style.color  = '#ef4444';
    msgEl.style.textShadow = '0 0 18px rgba(239,68,68,.35)';
  } else if (gameOver) {
    msgEl.textContent  = '✦   Surface Saturated   ✦';
    msgEl.style.color  = '#d97706';
    msgEl.style.textShadow = '0 0 16px rgba(217,119,6,.3)';
  } else {
    msgEl.textContent = '';
  }
}

// ============================================================
//  p5 sketch
// ============================================================
new p5(function(p) {

  // elastic-out ease: slight overshoot then settles
  function elasticOut(t) {
    if (t <= 0) return 0;
    if (t >= 1) return 1;
    return Math.pow(2, -10 * t) * Math.sin((t * 10 - 0.75) * (2 * Math.PI) / 3) + 1;
  }

  // place a scale at the given socket
  function placeScale(sock) {
    occupied.add(kk(sock.q, sock.r));
    const { x, y } = gridToPixel(sock.q, sock.r);

    if (sock.danger) {
      // ── LOSE: placed outside the boundary ───────────────────
      scales.push({
        q: sock.q, r: sock.r, x, y,
        poly:  makePolygon(x, y, sock.q, sock.r),
        col:   [210, 55, 55],   // red — wrong placement
        theta: tileTheta(sock.q, sock.r),
        animT: 0,
        animStart: p.millis(),
        wrong: true
      });
      spawnLoseParticles(x, y);
      gameLost = true;
      gameOver = true;
      updateUI();
      return;
    }

    // ── Normal placement ─────────────────────────────────────
    scales.push({
      q: sock.q, r: sock.r, x, y,
      poly:  makePolygon(x, y, sock.q, sock.r),
      col:   tileColor(sock.q, sock.r),
      theta: tileTheta(sock.q, sock.r),
      animT: 0,
      animStart: p.millis()
    });
    spawnParticles(x, y);
    scalesPlaced++;
    timeRemaining += 1;   // +1 second per scale placed
    
    // Spawn one new boundary unpredictably (~40% chance, after first 2 scales)
    if (sessionShapes.length < 20 && scalesPlaced > 2 && Math.random() < 0.4) {
      spawnNewBoundary();
    }
    
    recomputeSockets();
    // Win only when every cell inside every boundary is filled
    if (allBoundariesFilled()) gameOver = true;
    updateUI();
  }

  // ── draw helpers ─────────────────────────────────────────

  function drawGridDots() {
    p.noStroke();
    p.fill(0, 0, 0, 18);
    for (let q = -10; q <= 10; q++) {
      for (let r = -10; r <= 10; r++) {
        if (!inAnyShape(q, r)) continue;          // only inside any session boundary
        if (occupied.has(kk(q, r))) continue;
        const { x, y } = gridToPixel(q, r);
        p.circle(x, y, 2.5);
      }
    }
  }

  // Draws all active playfield boundaries as dashed polygons.
  function drawBoundary() {
    for (const shape of sessionShapes) {
      // Derive RGB color from shape's baseHue (use same saturation/brightness as accent)
      const shapeRgb = hsbToRgb(shape.baseHue, 76, 84);
      const [ar, ag, ab] = shapeRgb;
      
      const pts = shapeCornerPixels(shape);
      p.push();
      p.drawingContext.setLineDash([6, 6]);
      p.noFill();
      p.stroke(ar, ag, ab, 130);
      p.strokeWeight(1.8);
      p.drawingContext.shadowBlur  = 10;
      p.drawingContext.shadowColor = `rgba(${ar},${ag},${ab},0.35)`;
      p.beginShape();
      for (const pt of pts) p.vertex(pt.x, pt.y);
      p.endShape(p.CLOSE);
      
      p.drawingContext.setLineDash([]);
      p.drawingContext.shadowBlur = 0;
      p.pop();
    }
  }

  function drawScale(sc) {
    const t = Math.min(1, (p.millis() - sc.animStart) / DUR);
    sc.animT = t;
    const s = elasticOut(t);
    const { x, y, poly, col, theta } = sc;
    const [cr, cg, cb] = col;

    p.push();
    p.translate(x, y);
    p.scale(s);
    p.translate(-x, -y);

    // glow shadow — red pulse for wrong placements
    const glowAlpha = sc.wrong ? 0.55 : 0.38;
    p.drawingContext.shadowBlur  = sc.wrong ? 20 : 12;
    p.drawingContext.shadowColor = `rgba(${cr},${cg},${cb},${glowAlpha})`;

    // main body
    p.fill(cr, cg, cb, sc.wrong ? 210 : 225);
    p.stroke(sc.wrong ? 160 : 0, 0, 0, sc.wrong ? 60 : 28);
    p.strokeWeight(1);
    p.beginShape();
    for (const v of poly) p.vertex(v.x, v.y);
    p.endShape(p.CLOSE);

    p.drawingContext.shadowBlur = 0;

    // inner highlight ring at 63% size
    p.noFill();
    p.stroke(255, 255, 255, 55);
    p.strokeWeight(0.8);
    p.beginShape();
    for (const v of poly) p.vertex(x + (v.x - x) * 0.63, y + (v.y - y) * 0.63);
    p.endShape(p.CLOSE);

    // orientation arrow (global horizontal strain field)
    const aLen = HS * 0.42;
    const ax1  = x - Math.cos(theta) * aLen * 0.44;
    const ay1  = y - Math.sin(theta) * aLen * 0.44;
    const ax2  = x + Math.cos(theta) * aLen * 0.56;
    const ay2  = y + Math.sin(theta) * aLen * 0.56;
    p.stroke(30, 30, 30, 155);
    p.strokeWeight(1.3);
    p.line(ax1, ay1, ax2, ay2);
    // arrowhead
    const ha = 0.46, hl = 5.5;
    p.line(ax2, ay2, ax2 - hl * Math.cos(theta - ha), ay2 - hl * Math.sin(theta - ha));
    p.line(ax2, ay2, ax2 - hl * Math.cos(theta + ha), ay2 - hl * Math.sin(theta + ha));

    p.pop();
  }

  let hoverSock = null;

  function drawSockets() {
    hoverSock = null;
    // p5.js automatically converts touches to mouseX/mouseY
    const mx = p.mouseX;
    const my = p.mouseY;
    const t  = p.millis() * 0.001;

    for (const sk of sockets) {
      const d     = Math.hypot(mx - sk.x, my - sk.y);
      const hover = d < HS * 0.72;
      if (hover) hoverSock = sk;

      const pulse  = 0.62 + 0.38 * Math.sin(t * 2.6 + sk.x * 0.048 + sk.y * 0.031);
      const baseR  = hover ? HS * 0.50 : HS * 0.38;
      const alpha  = hover ? 210 : (50 + 70 * pulse);

      // Find which shape this socket belongs to and use its color
      const shape = findShapeForTile(sk.q, sk.r);
      const socketRgb = shape 
        ? hsbToRgb(shape.baseHue, 76, 84)  // Use shape's color
        : accentRgb;  // Fallback to accent if outside all shapes
      const [ar, ag, ab] = socketRgb;
      
      p.noStroke();
      // soft glow halos
      for (let g = 3; g >= 1; g--) {
        p.fill(ar, ag, ab, (alpha * 0.12) / g);
        p.circle(sk.x, sk.y, baseR * 2 * (1 + g * 0.35));
      }
      // core circle
      p.fill(ar, ag, ab, alpha);
      p.circle(sk.x, sk.y, baseR * 2);

      // bright centre for high-neighbour sockets (≥3)
      if (sk.cnt >= 3) {
        p.fill(255, 255, 220, 155);
        p.circle(sk.x, sk.y, 4.5);
      }
    }
  }

  function drawParticles() {
    for (let i = particles.length - 1; i >= 0; i--) {
      const pt = particles[i];
      pt.life -= pt.decay;
      if (pt.life <= 0) { particles.splice(i, 1); continue; }

      if (pt.type === 'dot') {
        pt.x += pt.vx; pt.y += pt.vy;
        pt.vx *= 0.90; pt.vy *= 0.90;
        const [dr, dg, db] = hsbToRgb(pt.hue, pt.sat, pt.bri);
        p.noStroke();
        p.fill(dr, dg, db, pt.life * 230);
        const sz = pt.sz * (0.5 + 0.5 * pt.life);
        p.circle(pt.x, pt.y, sz * 2);

      } else {  // ring — uses pt.rgb if set (e.g. lose burst), else session accent
        pt.progress = Math.min(1, pt.progress + pt.speed);
        const rad = pt.startR + (pt.endR - pt.startR) * pt.progress;
        const [rr, rg, rb] = pt.rgb || accentRgb;
        p.noFill();
        p.stroke(rr, rg, rb, pt.life * 170);
        p.strokeWeight(1.5);
        p.circle(pt.x, pt.y, rad * 2);
      }
    }
  }

  function drawGameOverOverlay() {
    if (!gameOver || particles.length > 0) return;
    // subtle pulsing vignette
    const a = 30 + 10 * Math.sin(p.millis() * 0.0018);
    p.noStroke();
    const grad = p.drawingContext.createRadialGradient(
      C / 2, CH / 2, CH * 0.28,
      C / 2, CH / 2, CH * 0.72
    );
    grad.addColorStop(0, `rgba(0,0,0,0)`);
    grad.addColorStop(1, `rgba(251,191,36,${a / 255})`);
    p.drawingContext.fillStyle = grad;
    p.drawingContext.fillRect(0, 0, C, CH);
  }

  // ── p5 lifecycle ─────────────────────────────────────────

  p.setup = function () {
    // Set canvas width: desktop uses full width, mobile uses screen width
    const isMobile = window.innerWidth <= 768;
    let canvasHeight = CH;
    
    if (isMobile) {
      // On mobile, use screen width and start with base height
      // Canvas will expand dynamically as boundaries are added
      C = window.innerWidth - 20;
      canvasHeight = CH;  // Start with base height, will expand as needed
      actualCanvasHeight = canvasHeight;
    } else {
      // Desktop: use full width with padding
      C = Math.max(580, window.innerWidth - 40);
      canvasHeight = CH;
      actualCanvasHeight = CH;
    }
    
    const cnv = p.createCanvas(C, canvasHeight);
    cnv.parent('canvas-wrap');
    // Canvas is intentionally transparent — no background, no border, no shadow.
    // The game elements float directly on the white page.
    cnv.style('background', 'transparent');
    cnv.style('display', 'block');
    if (isMobile) {
      cnv.style('width', '100%');
      cnv.style('max-width', '100%');
      // Allow both vertical scrolling and taps
      cnv.elt.style.touchAction = 'pan-y';
    }
    gameCanvas = cnv;   // store for applySessionTheme()
    p.frameRate(60);
    initGame();         // picks sessionHue, sets accentRgb, calls applySessionTheme
    updateUI();
    
    // Add touch event support for reset button on mobile
    const resetBtn = document.getElementById('reset-btn');
    if (resetBtn) {
      resetBtn.addEventListener('touchend', function(e) {
        e.preventDefault();
        e.stopPropagation();
        resetGame();
      }, { passive: false });
    }
  };

  p.draw = function () {
    p.clear();   // transparent every frame — no white canvas square

    // Timer countdown (only when game is active)
    if (!gameOver) {
      const now = p.millis();
      if (lastTimerMs > 0) {
        const deltaSec = (now - lastTimerMs) / 1000;
        timeRemaining = Math.max(0, timeRemaining - deltaSec);
        if (timeRemaining <= 0) {
          timerExpired = true;
          gameOver = true;
        }
      }
      lastTimerMs = now;
    }

    drawBoundary();
    drawGridDots();
    drawSockets();
    for (const sc of scales) drawScale(sc);
    drawParticles();
    drawGameOverOverlay();

    updateUI();   // refresh timer + message every frame
    p.cursor(hoverSock ? 'pointer' : p.ARROW);
  };

  // Track touch movement to distinguish taps from scrolls
  let touchStartX = 0;
  let touchStartY = 0;
  let touchMoved = false;

  p.touchStarted = function () {
    if (p.touches.length > 0) {
      touchStartX = p.touches[0].x;
      touchStartY = p.touches[0].y;
      touchMoved = false;
      p.mouseX = touchStartX;
      p.mouseY = touchStartY;
    }
    return true;  // Allow default (scrolling)
  };

  p.touchMoved = function () {
    if (p.touches.length > 0) {
      const dx = Math.abs(p.touches[0].x - touchStartX);
      const dy = Math.abs(p.touches[0].y - touchStartY);
      // If moved more than 10px, consider it a scroll
      if (dx > 10 || dy > 10) {
        touchMoved = true;
      }
      p.mouseX = p.touches[0].x;
      p.mouseY = p.touches[0].y;
    }
    return true;  // Always allow scrolling
  };

  p.touchEnded = function () {
    // Only treat as tap if touch didn't move much
    if (!touchMoved && !gameOver) {
      const mx = p.mouseX;
      const my = p.mouseY;
      
      // Check for socket at touch position
      for (const sk of sockets) {
        const d = Math.hypot(mx - sk.x, my - sk.y);
        if (d < HS * 0.72) {
          placeScale(sk);
          return false;  // Prevent default only when placing a scale
        }
      }
    }
    return true;  // Allow default (scrolling)
  };

  p.mousePressed = function () {
    // For mouse (desktop), handle normally
    if (gameOver) return true;
    
    const mx = p.mouseX;
    const my = p.mouseY;
    let clickedSock = null;
    for (const sk of sockets) {
      const d = Math.hypot(mx - sk.x, my - sk.y);
      if (d < HS * 0.72) {
        clickedSock = sk;
        break;
      }
    }
    
    if (clickedSock) {
      placeScale(clickedSock);
      return false;
    }
    
    return true;
  };

  // Handle window resize — update canvas width
  p.windowResized = function () {
    const isMobile = window.innerWidth <= 768;
    let canvasHeight = CH;
    
    if (isMobile) {
      C = window.innerWidth - 20;
      // Start with base height, expand if boundaries exist
      canvasHeight = CH;
      actualCanvasHeight = canvasHeight;
      // Expand canvas to fit existing boundaries
      expandCanvasIfNeeded();
      canvasHeight = actualCanvasHeight;  // Use expanded height
    } else {
      C = Math.max(580, window.innerWidth - 40);
      canvasHeight = CH;
      actualCanvasHeight = CH;
    }
    
    p.resizeCanvas(C, canvasHeight);
    if (isMobile && gameCanvas) {
      gameCanvas.style('width', '100%');
      gameCanvas.style('max-width', '100%');
    }
  };

  // expose reset to the HTML button
  window.resetGame = function () {
    initGame();
    updateUI();
  };

}); // end p5
</script>
